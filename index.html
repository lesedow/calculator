<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" type="text/css" href="styles.css">
	<title>Calculator</title>
</head>
<body>
	<div class="container">
		<div id="calculator" class="calculator">
			<div class="screen">
				<p id="screen" class="text">0</p>
			</div>
			<div class="buttons-grid">
				<button id="clear" class="clear">AC</button>
				<button id="divide" class="divide">/</button>
				<button id="multiply" class="multiply">*</button>
				<button id="add" class="add">+</button>
				<button id="substract" class="substract">-</button>
				<button id="equal" class="equal">=</button>
				<button id="nine" class="nine">9</button>
				<button id="eight" class="eight">8</button>
				<button id="seven" class="seven">7</button>
				<button id="six" class="six">6</button>
				<button id="five" class="five">5</button>
				<button id="four" class="four">4</button>
				<button id="three" class="three">3</button>
				<button id="two" class="two">2</button>
				<button id="one" class="one">1</button>
				<button id="zero" class="zero">0</button>
			</div>
		</div>
	</div>
	<script type="text/javascript" src="index.js"></script>	
</body>
</html>
